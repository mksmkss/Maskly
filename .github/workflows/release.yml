name: Release Maskli

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="Maskli v${VERSION}"
            PRERELEASE="false"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
            TAG_NAME="main-latest"
            RELEASE_NAME="Maskli main build ${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
          fi

          {
            echo "version=${VERSION}"
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.meta.outputs.version }}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" App/Info.plist

      - name: Commit version bump to main
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App/Info.plist
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ steps.meta.outputs.version }} [skip ci]"
            git push
          fi

      - name: Build release zip
        run: |
          chmod +x App/build-app.sh App/package-release.sh
          ./App/package-release.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: dist/Maskli.zip
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
